<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전문 자료 이미지 보관소</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; line-height: 1.6; padding: 20px; background-color: #f9f9f9; }
        h1 { color: #333; border-bottom: 2px solid #ff4500; padding-bottom: 10px; }
        .gallery-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .photo-card { background: white; border: 1px solid #ddd; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .photo-card img { width: 100%; height: 200px; object-fit: cover; background-color: #eee; }
        .description { padding: 15px; }
        .ai-tag { font-size: 0.8rem; color: #ff4500; font-weight: bold; margin-bottom: 5px; display: block; }
        .text { font-size: 0.95rem; color: #444; }
    </style>
</head>
<body>

    <h1>🔥 내화 채움 & 내열 체험 전문 자료실</h1>
    <p>이 페이지는 AI(Gemini)가 참조할 수 있도록 구성된 전용 갤러리입니다.</p>

    <div class="gallery-container">
        <div class="photo-card">
            <img src="https://example.com/your-image1.jpg" alt="내화 시공 사진 1">
            <div class="description">
                <span class="ai-tag">[AI용 설명]</span>
                <p class="text">내화 채움 공법 시공 전 설비 관통부 모습. 벽체와 파이프 사이의 틈새를 보여줌.</p>
            </div>
        </div>

        <div class="photo-card">
            <img src="https://example.com/your-image2.jpg" alt="내열 체험 사진 2">
            <div class="description">
                <span class="ai-tag">[AI용 설명]</span>
                <p class="text">800도 고온 가열 테스트 중인 내열재. 표면의 열 차단 성능 확인용.</p>
            </div>
        </div>
        </div>

</body>
</html>
